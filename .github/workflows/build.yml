name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Create gradlew wrapper
      run: |
        cd android-app
        # Create gradle wrapper files
        mkdir -p gradle/wrapper
        echo 'distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
        networkTimeout=10000
        validateDistributionUrl=true
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists' > gradle/wrapper/gradle-wrapper.properties
        
        # Download gradle wrapper
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.5.0/subprojects/wrapper/src/main/resources/gradle-wrapper.jar
        
        # Create gradlew script
        echo '#!/bin/sh
        exec "$(dirname "$0")/gradle/wrapper/gradle-wrapper.jar" "$@"' > gradlew
        chmod +x gradlew
        
        # Alternative: use system gradle
        which gradle || (sudo apt-get update && sudo apt-get install -y gradle)
      
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
      
    - name: Build Debug APK
      run: |
        cd android-app
        if [ -f ./gradlew ]; then
          ./gradlew assembleDebug --stacktrace
        else
          gradle assembleDebug --stacktrace
        fi
      continue-on-error: true
      
    - name: Build Release APK
      run: |
        cd android-app
        if [ -f ./gradlew ]; then
          ./gradlew assembleRelease --stacktrace
        else
          gradle assembleRelease --stacktrace
        fi
      continue-on-error: true
      
    - name: Check build outputs
      run: |
        echo "Checking build outputs..."
        ls -la android-app/app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug APK not found"
        ls -la android-app/app/build/outputs/apk/release/ 2>/dev/null || echo "Release APK not found"
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: AI-Text-Assistant-Debug-APK
        path: android-app/app/build/outputs/apk/debug/*.apk
        retention-days: 30
        if-no-files-found: warn
        
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: AI-Text-Assistant-Release-APK
        path: android-app/app/build/outputs/apk/release/*.apk
        retention-days: 30
        if-no-files-found: warn
