name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5
        cache-disabled: true
        
    - name: Create local.properties
      run: |
        cd android-app
        echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
        cat local.properties
        
    - name: Check project structure
      run: |
        echo "=== Project structure ==="
        ls -la android-app/
        echo "=== App build.gradle ==="
        cat android-app/app/build.gradle.kts
        
    - name: Build Debug APK
      run: |
        cd android-app
        gradle :app:assembleDebug --stacktrace --info 2>&1 | head -200
      continue-on-error: true
      
    - name: Build Release APK
      run: |
        cd android-app
        gradle :app:assembleRelease --stacktrace --info 2>&1 | head -200
      continue-on-error: true
      
    - name: Check build outputs
      run: |
        echo "=== Checking build outputs ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
        echo "=== Build directory ==="
        ls -la android-app/app/build/ 2>/dev/null || echo "Build directory not found"
        echo "=== Outputs directory ==="
        ls -la android-app/app/build/outputs/ 2>/dev/null || echo "Outputs directory not found"
        echo "=== APK directory ==="
        ls -la android-app/app/build/outputs/apk/ 2>/dev/null || echo "APK directory not found"
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: AI-Text-Assistant-Debug-APK
        path: android-app/app/build/outputs/apk/debug/*.apk
        retention-days: 30
        if-no-files-found: warn
        
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: AI-Text-Assistant-Release-APK
        path: android-app/app/build/outputs/apk/release/*.apk
        retention-days: 30
        if-no-files-found: warn
